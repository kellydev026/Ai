<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-V5 | Edge Intelligence</title>
    <style>
        :root {
            --neon: #00d4ff;
            --deep: #020b1a;
            --glass: rgba(10, 25, 47, 0.7);
            --border: rgba(0, 212, 255, 0.3);
            --glow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--deep);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 102, 255, 0.05) 0%, transparent 40%);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Layout Grid */
        .container {
            width: 95vw;
            height: 90vh;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 300px 1fr;
            grid-template-rows: 1fr 180px;
            gap: 20px;
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Sidebar - System Logs */
        .sidebar {
            grid-row: 1 / 3;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .terminal-header {
            font-size: 0.7rem;
            color: var(--neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        #terminal-log {
            flex-grow: 1;
            font-family: 'Consolas', monospace;
            font-size: 0.75rem;
            color: #88a;
            overflow-y: auto;
            line-height: 1.5;
        }

        /* Main Processing Area */
        .main-stage {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .neural-core {
            width: 120px;
            height: 120px;
            border: 2px solid var(--neon);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--glow);
            margin-bottom: 30px;
        }

        .neural-core::after {
            content: '';
            position: absolute;
            width: 140%;
            height: 140%;
            border: 1px dashed var(--neon);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
            opacity: 0.3;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .pulse-orb {
            width: 60px;
            height: 60px;
            background: var(--neon);
            border-radius: 50%;
            filter: blur(15px);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(0.8); opacity: 0.5; } }

        .ai-status { font-size: 1.8rem; font-weight: bold; text-shadow: var(--glow); margin-top: 10px; }
        .ai-sub { font-size: 0.8rem; color: #88a; text-transform: uppercase; letter-spacing: 2px; }

        /* Input Bar */
        .input-bar {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon); background: rgba(0,212,255,0.05); }

        button {
            background: var(--neon);
            color: var(--deep);
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: translateY(-2px); box-shadow: var(--glow); }

        /* Metrics */
        .metrics {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
        }
        .metric-box { margin-bottom: 10px; }
        .metric-label { font-size: 0.6rem; color: var(--neon); opacity: 0.7; }
        .metric-value { font-size: 1rem; font-family: monospace; }

    </style>
</head>
<body>

    <div class="container">
        <!-- Sidebar Logs -->
        <aside class="sidebar">
            <div class="terminal-header">
                <span>System Console</span>
                <span style="color: #4f4;">Online</span>
            </div>
            <div id="terminal-log">
                [0.00] Booting Neural-V5 Core...<br>
                [0.12] Loading Linguistic Matrix...<br>
                [0.45] Frontend Logic Engine Active.<br>
                [0.89] Ready for local processing.<br>
            </div>
        </aside>

        <!-- Display Stage -->
        <main class="main-stage">
            <div class="metrics">
                <div class="metric-box">
                    <div class="metric-label">CONFIDENCE</div>
                    <div class="metric-value" id="val-conf">0.00%</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">LATENCY</div>
                    <div class="metric-value" id="val-lat">0ms</div>
                </div>
            </div>

            <div class="neural-core">
                <div class="pulse-orb"></div>
            </div>
            <div class="ai-sub">Inference Engine Output</div>
            <div class="ai-status" id="ai-result">AWAITING INPUT</div>
        </main>

        <!-- Input Footer -->
        <footer class="input-bar">
            <input type="text" id="user-input" placeholder="Type something for the AI to analyze..." autocomplete="off">
            <button onclick="processAI()">Execute</button>
        </footer>
    </div>

    <script>
        // INTERNAL "BACKEND" LOGIC ENGINE
        const logBox = document.getElementById('terminal-log');
        
        function log(msg) {
            const time = (performance.now() / 1000).toFixed(2);
            logBox.innerHTML += `[${time}] ${msg}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function processAI() {
            const input = document.getElementById('user-input');
            const resultText = document.getElementById('ai-result');
            const confVal = document.getElementById('val-conf');
            const latVal = document.getElementById('val-lat');
            const start = performance.now();

            const text = input.value.trim().toLowerCase();
            if (!text) return;

            log(`Input detected: "${text.substring(0, 15)}..."`);
            log("Running internal linguistic analysis...");

            // Simulated Neural Processing (Internal Logic)
            setTimeout(() => {
                // Scoring Matrix
                const positiveWords = ['good', 'love', 'great', 'happy', 'amazing', 'best', 'cool', 'yes', 'excellent'];
                const negativeWords = ['bad', 'hate', 'sad', 'terrible', 'worst', 'no', 'awful', 'angry'];
                
                let score = 0;
                const words = text.split(/\s+/);
                
                words.forEach(w => {
                    if (positiveWords.includes(w)) score++;
                    if (negativeWords.includes(w)) score--;
                });

                // Determine Sentiment
                let sentiment = "NEUTRAL";
                let color = "white";
                if (score > 0) { sentiment = "POSITIVE"; color = "#00ffaa"; }
                if (score < 0) { sentiment = "NEGATIVE"; color = "#ff4466"; }

                // Update UI
                const end = performance.now();
                const latency = (end - start).toFixed(0);
                const confidence = (75 + Math.random() * 20).toFixed(2);

                resultText.innerText = sentiment;
                resultText.style.color = color;
                confVal.innerText = `${confidence}%`;
                latVal.innerText = `${latency}ms`;

                log(`Inference complete: ${sentiment}`);
                input.value = '';
            }, 300); // Small delay to feel "professional"
        }

        // Enter key support
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processAI();
        });
    </script>
</body>
</html>
