<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-X | Pro AI Interface</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --electric-indigo: #6366f1;
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(0, 242, 255, 0.15);
            --text-primary: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animated Cyber Background */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #001e3c 0%, #020617 100%);
        }
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            opacity: 0.3;
        }

        /* Main Dashboard Structure */
        .dashboard {
            width: 95vw;
            height: 90vh;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            grid-template-rows: 1fr;
            gap: 20px;
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 0 80px rgba(0, 242, 255, 0.1);
        }

        /* Generic Card Styling */
        .panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* Left Sidebar: Session Log */
        .history-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .history-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 0.85rem;
            border-left: 3px solid var(--electric-indigo);
            transition: 0.3s;
        }
        .history-item:hover { background: rgba(255, 255, 255, 0.1); }

        /* Center View: Neural Core */
        .center-panel {
            display: grid;
            grid-template-rows: 1fr auto;
            gap: 20px;
        }
        .core-display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .neural-orb {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--neon-blue) 0%, transparent 70%);
            filter: blur(40px);
            position: absolute;
            animation: pulse 4s infinite;
            opacity: 0.4;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.6; }
        }

        #output-text { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; z-index: 1; }
        #sub-output { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--text-dim); z-index: 1; }

        .input-container {
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 18px;
            border: 1px solid var(--border);
        }
        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 15px;
            font-size: 1rem;
        }
        button {
            background: var(--neon-blue);
            color: var(--bg-dark);
            border: none;
            padding: 0 30px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { 
            box-shadow: 0 0 20px var(--neon-blue);
            transform: translateY(-2px);
        }

        /* Right Panel: Analytics */
        .analytics { gap: 24px; }
        .telemetry-item { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 6px; color: var(--text-dim); }
        .progress-bg { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--neon-blue); transition: width 0.5s; width: 0%; }

        .gauge-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 180px;
        }
        .gauge-svg { width: 160px; transform: rotate(-90deg); }
        .gauge-track { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 12; }
        .gauge-value { 
            fill: none; stroke: var(--neon-blue); stroke-width: 12; 
            stroke-dasharray: 440; stroke-dashoffset: 440; 
            transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .export-btn {
            margin-top: auto;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid transparent;
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Synchronizing Neural Weights...</p>
    </div>

    <div class="bg-layer"><div class="bg-grid"></div></div>

    <div class="dashboard">
        <!-- Sidebar: Session History -->
        <aside class="panel">
            <h2>Session Memory</h2>
            <div class="history-list" id="history-list">
                <div style="color: var(--text-dim); font-size: 0.8rem; text-align: center; margin-top: 20px;">No inferences logged.</div>
            </div>
        </aside>

        <!-- Main View: AI Engine -->
        <main class="center-panel">
            <div class="panel core-display">
                <div class="neural-orb"></div>
                <div id="output-text">STANDBY</div>
                <div id="sub-output">Awaiting data sequence for processing</div>
            </div>

            <div class="input-container">
                <input type="text" id="user-input" placeholder="Enter string for neural analysis..." autocomplete="off">
                <button id="run-btn">EXECUTE</button>
            </div>
        </main>

        <!-- Right: Analytics -->
        <aside class="panel analytics">
            <h2>Live Telemetry</h2>
            
            <div class="telemetry-item">
                <div class="label-row"><span>Logic Latency</span><span id="stat-latency">0ms</span></div>
                <div class="progress-bg"><div id="bar-latency" class="progress-fill" style="width: 10%"></div></div>
            </div>

            <div class="telemetry-item">
                <div class="label-row"><span>System RAM Usage</span><span id="stat-ram">1.2GB</span></div>
                <div class="progress-bg"><div id="bar-ram" class="progress-fill" style="width: 45%"></div></div>
            </div>

            <h2>Confidence Metric</h2>
            <div class="gauge-box">
                <svg class="gauge-svg" viewBox="0 0 160 160">
                    <circle class="gauge-track" cx="80" cy="80" r="70"></circle>
                    <circle id="gauge-progress" class="gauge-value" cx="80" cy="80" r="70"></circle>
                </svg>
                <div style="position: absolute; text-align: center;">
                    <div id="gauge-pct" style="font-size: 1.8rem; font-weight: 700;">0%</div>
                    <div style="font-size: 0.6rem; color: var(--text-dim);">PROBABILITY</div>
                </div>
            </div>

            <button class="export-btn" id="export-btn">EXPORT DATASET (.JSON)</button>
        </aside>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // State & Elements
        let classifier;
        let logs = [];
        const btn = document.getElementById('run-btn');
        const input = document.getElementById('user-input');
        const mainText = document.getElementById('output-text');
        const subText = document.getElementById('sub-output');
        const loading = document.getElementById('loading-overlay');
        const historyBox = document.getElementById('history-list');
        const gauge = document.getElementById('gauge-progress');
        const gaugePct = document.getElementById('gauge-pct');

        // 1. Initialise local "Backend" in Frontend
        async function initEngine() {
            try {
                classifier = await pipeline('sentiment-analysis', 'Xenova/distilbert-base-uncased-finetuned-sst-2-english');
                loading.style.display = 'none';
                updateStats();
            } catch (e) {
                document.getElementById('loading-text').innerText = "Network Error: Model download failed.";
                console.error(e);
            }
        }

        // 2. Perform AI Inference
        async function runInference() {
            const text = input.value.trim();
            if (!text || !classifier) return;

            // UI feedback
            btn.disabled = true;
            mainText.style.opacity = "0.3";
            const startTime = performance.now();

            // The Real AI Call (Inside Browser)
            const result = await classifier(text);
            
            const endTime = performance.now();
            const latency = Math.round(endTime - startTime);
            
            const { label, score } = result[0];
            const confidence = Math.round(score * 100);

            // Update UI
            updateUI(label, confidence, latency, text);
            btn.disabled = false;
            input.value = '';
        }

        function updateUI(label, confidence, latency, originalText) {
            // Main Output
            mainText.innerText = label;
            mainText.style.opacity = "1";
            mainText.style.color = label === 'POSITIVE' ? '#00ffaa' : '#ff4466';
            subText.innerText = `Processed in ${latency}ms at Edge`;

            // Gauge
            const offset = 440 - (440 * confidence) / 100;
            gauge.style.strokeDashoffset = offset;
            gaugePct.innerText = `${confidence}%`;

            // Telemetry
            document.getElementById('stat-latency').innerText = `${latency}ms`;
            document.getElementById('bar-latency').style.width = `${Math.min(latency / 10, 100)}%`;

            // History Log
            logs.unshift({ text: originalText, label, confidence, latency, timestamp: new Date().toLocaleTimeString() });
            renderHistory();
        }

        function renderHistory() {
            historyBox.innerHTML = logs.map(log => `
                <div class="history-item">
                    <div style="font-weight:600; font-size: 0.7rem; color: var(--neon-blue)">${log.timestamp}</div>
                    <div style="margin: 4px 0;">"${log.text.substring(0, 40)}..."</div>
                    <div style="font-size: 0.7rem; opacity: 0.7">${log.label} | ${log.confidence}%</div>
                </div>
            `).join('');
        }

        function updateStats() {
            // Simulated live hardware monitoring for professional look
            setInterval(() => {
                const ram = (1.1 + Math.random() * 0.2).toFixed(1);
                document.getElementById('stat-ram').innerText = `${ram}GB`;
                document.getElementById('bar-ram').style.width = `${(ram/4)*100}%`;
            }, 3000);
        }

        // Export Logic
        document.getElementById('export-btn').onclick = () => {
            if(logs.length === 0) return alert("No data to export.");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(logs));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "neural_x_session.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        // Listeners
        btn.onclick = runInference;
        input.onkeypress = (e) => e.key === 'Enter' && runInference();

        initEngine();
    </script>
</body>
</html>
